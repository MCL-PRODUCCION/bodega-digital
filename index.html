<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MCL - Bodega Ultra Rápida</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root { --navy: #1a252f; --blue: #0d6efd; --bg: #f8f9fa; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; }
        .sidebar { width: 280px; background: var(--navy); min-height: 100vh; position: fixed; transition: 0.3s; z-index: 1000; color: white; padding: 20px; display: none; }
        .main-content { margin-left: 280px; padding: 20px; transition: 0.3s; display: none; }
        @media (max-width: 991px) {
            .sidebar { margin-left: -280px; display: block; }
            .sidebar.active { margin-left: 0; }
            .main-content { margin-left: 0; padding-top: 70px; display: block; }
            .mobile-header { display: flex !important; }
        }
        .mobile-header { display: none; position: fixed; top: 0; width: 100%; background: var(--navy); padding: 15px; z-index: 1100; justify-content: space-between; align-items: center; color: white; }
        #login-container { position: fixed; inset: 0; background: var(--navy); display: flex; justify-content: center; align-items: center; z-index: 2000; }
        .login-card { background: white; padding: 35px; border-radius: 20px; width: 90%; max-width: 380px; text-align: center; }
        .loading-overlay { position: fixed; inset: 0; background: rgba(255,255,255,0.8); display: none; justify-content: center; align-items: center; z-index: 3000; }
        .nav-link { color: rgba(255,255,255,0.7); padding: 12px; border-radius: 10px; display: flex; align-items: center; gap: 10px; text-decoration: none; cursor: pointer; }
        .nav-link.active { background: rgba(255,255,255,0.1); color: white; border-left: 4px solid var(--blue); }
        .admin-only { display: none; }
    </style>
</head>
<body>

<div id="loader" class="loading-overlay"><div class="spinner-border text-primary"></div></div>

<div class="mobile-header shadow" id="mobile-header">
    <span class="fw-bold">MCL BODEGA</span>
    <button class="btn btn-primary" onclick="toggleSidebar()"><i class="bi bi-list"></i></button>
</div>

<div id="login-container">
    <div class="login-card shadow-lg">
        <h5 class="fw-bold text-muted mb-4">Acceso Bodega</h5>
        <form id="form-login">
            <input type="text" id="user" class="form-control mb-3" placeholder="Usuario" required>
            <input type="password" id="pass" class="form-control mb-4" placeholder="Contraseña" required>
            <button type="submit" class="btn btn-primary w-100 py-2">Entrar</button>
        </form>
    </div>
</div>

<div class="sidebar shadow" id="sidebar">
    <div class="text-center mb-4"><h4>MCL</h4></div>
    <div class="p-3 rounded mb-4 text-center" style="background: rgba(255,255,255,0.05);">
        <h6 id="logged-user-name" class="text-info mb-1 small fw-bold"></h6>
        <span id="user-role-badge" class="badge bg-secondary" style="font-size: 0.6rem;"></span>
    </div>
    <nav class="nav flex-column">
        <a class="nav-link active" onclick="showSection('section-inventario', this)"><i class="bi bi-box-seam"></i> Stock</a>
        <div id="admin-menu" class="admin-only">
            <a class="nav-link" onclick="showSection('section-ingreso', this)"><i class="bi bi-plus-circle"></i> Ingreso</a>
            <a class="nav-link" onclick="showSection('section-salida', this)"><i class="bi bi-dash-circle"></i> Salida</a>
        </div>
        <hr class="opacity-25 text-white">
        <a class="nav-link text-danger" onclick="logout()"><i class="bi bi-power"></i> Salir</a>
    </nav>
</div>

<div class="main-content" id="main-content">
    <!-- STOCK -->
    <section id="section-inventario">
        <h2 class="fw-bold mb-4">Stock Actual</h2>
        <div class="card p-2 mb-4 border-0 shadow-sm">
            <input type="text" id="stock-search" class="form-control border-0 shadow-none" placeholder="Buscar ID o Producto...">
        </div>
        <div class="card shadow-sm border-0">
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                    <thead class="bg-light">
                        <tr class="small"><th>PRODUCTO</th><th>STOCK</th><th>UBICACIÓN</th></tr>
                    </thead>
                    <tbody id="table-stock"></tbody>
                </table>
            </div>
        </div>
    </section>

    <!-- INGRESO -->
    <section id="section-ingreso" style="display:none;">
        <h2 class="fw-bold mb-4">📥 Registro de Ingreso</h2>
        <div class="card p-4 border-0 shadow-sm">
            <form id="form-ingreso">
                <div class="mb-3"><label class="small fw-bold">ID Producto</label><input type="text" id="in-id" class="form-control" required></div>
                <div class="row g-2">
                    <div class="col-6"><label class="small fw-bold">Cantidad</label><input type="number" id="in-cantidad" class="form-control" required></div>
                    <div class="col-6"><label class="small fw-bold">Fecha</label><input type="date" id="in-fecha" class="form-control" required></div>
                    <div class="col-6"><label class="small fw-bold">Bodega</label><input type="text" id="in-bodega" class="form-control" required></div>
                    <div class="col-6"><label class="small fw-bold">Rack</label><input type="text" id="in-rack" class="form-control" required></div>
                </div>
                <button type="submit" class="btn btn-primary w-100 mt-4 py-3 fw-bold">GUARDAR EN STOCK</button>
            </form>
        </div>
    </section>

    <!-- SALIDA -->
    <section id="section-salida" style="display:none;">
        <h2 class="fw-bold mb-4">📤 Salida Instantánea</h2>
        <div class="card p-4 border-0 shadow-sm">
            <input type="text" id="search-out" class="form-control form-control-lg mb-3" placeholder="ID o Nombre para retirar...">
            <div id="output-area"></div>
        </div>
    </section>
</div>

<script>
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbyIVRsyMSs9IBZn5r3O4xat2YEy8bnoxMryav4UEjuMWaKc0DpKPvMs7T1uD-YcNPH2Ow/exec"; 
    
    let inventory = [];
    let currentUser = "";
    let userRole = "";

    const Toast = Swal.mixin({ toast: true, position: 'top-end', showConfirmButton: false, timer: 2000 });

    window.onload = function() {
        const savedUser = localStorage.getItem('mcl_user');
        const savedRole = localStorage.getItem('mcl_role');
        if (savedUser) iniciarInterfaz(savedUser, savedRole);
        document.getElementById('in-fecha').value = new Date().toISOString().split('T')[0];
    };

    function toggleSidebar() { document.getElementById('sidebar').classList.toggle('active'); }

    document.getElementById('form-login').addEventListener('submit', async (e) => {
        e.preventDefault();
        showLoader(true);
        try {
            const res = await fetch(WEB_APP_URL, { 
                method: 'POST', 
                body: JSON.stringify({ 
                    action: "login", 
                    user: document.getElementById('user').value, 
                    pass: document.getElementById('pass').value 
                }) 
            });
            const result = await res.json();
            if (result.success) {
                localStorage.setItem('mcl_user', result.user);
                localStorage.setItem('mcl_role', result.role);
                iniciarInterfaz(result.user, result.role);
            } else { Toast.fire({ icon: 'error', title: 'Usuario o clave incorrecta' }); }
        } catch (err) { Toast.fire({ icon: 'error', title: 'Error de conexión' }); }
        showLoader(false);
    });

    async function iniciarInterfaz(user, role) {
        currentUser = user; userRole = role;
        document.getElementById('logged-user-name').innerText = currentUser;
        document.getElementById('user-role-badge').innerText = userRole;
        if(userRole === "ADMIN") document.getElementById('admin-menu').style.display = 'block';
        document.getElementById('login-container').style.display = 'none';
        document.getElementById('sidebar').style.display = 'block';
        document.getElementById('main-content').style.display = 'block';
        await loadData();
    }

    async function loadData() {
        try {
            const response = await fetch(WEB_APP_URL);
            const data = await response.json();
            inventory = data; // Ya vienen mapeados con 'nombre' desde el servidor
            renderStock(inventory);
        } catch (e) { console.error(e); }
    }

    function renderStock(data) {
        const tbody = document.getElementById('table-stock');
        tbody.innerHTML = data.map(i => `
            <tr>
                <td class="ps-3"><div class="fw-bold">${i.id}</div><div class="small text-muted">${i.nombre}</div></td>
                <td><span class="badge ${i.cantidad < 5 ? 'bg-warning text-dark' : 'bg-primary'}">${i.cantidad} uds</span></td>
                <td><div class="small fw-bold">${i.bodega}</div><div class="small text-muted">Rack: ${i.rack}</div></td>
            </tr>
        `).join('');
    }

    // Buscador
    document.getElementById('stock-search').addEventListener('input', (e) => {
        const q = e.target.value.toLowerCase();
        renderStock(inventory.filter(i => i.id.toString().includes(q) || i.nombre.toLowerCase().includes(q)));
    });

    // Salida
    window.currentOutMatches = [];
    document.getElementById('search-out').addEventListener('input', (e) => {
        const val = e.target.value.trim().toLowerCase();
        const area = document.getElementById('output-area');
        if(!val) { area.innerHTML = ''; return; }
        const matches = inventory.filter(i => i.id.toString().toLowerCase().includes(val) || i.nombre.toLowerCase().includes(val));
        window.currentOutMatches = matches;
        area.innerHTML = matches.map((match, index) => `
            <div class="p-3 border rounded shadow-sm bg-white mb-2">
                <div class="d-flex justify-content-between align-items-center">
                    <div><h6 class="fw-bold mb-0">${match.nombre}</h6><small>${match.id} | Stock: ${match.cantidad} | Rack: ${match.rack}</small></div>
                    <div class="input-group input-group-sm" style="width: 140px;">
                        <input type="number" id="out-cnt-${index}" class="form-control" value="1">
                        <button onclick="confirmarSalida(${index})" class="btn btn-danger"><i class="bi bi-check"></i></button>
                    </div>
                </div>
            </div>`).join('');
    });

    async function confirmarSalida(index) {
        const match = window.currentOutMatches[index];
        const cant = parseInt(document.getElementById(`out-cnt-${index}`).value);
        if(!cant || cant <= 0 || cant > match.cantidad) return Toast.fire({ icon: 'warning', title: 'Revisar cantidad' });

        const nuevaCant = match.cantidad - cant;

        // Actualización local rápida
        const invIdx = inventory.findIndex(i => i.id === match.id && i.rack === match.rack);
        if (invIdx !== -1) {
            if (nuevaCant <= 0) {
                inventory.splice(invIdx, 1);
                Toast.fire({ icon: 'info', title: 'Agotado y eliminado' });
            } else {
                inventory[invIdx].cantidad = nuevaCant;
                Toast.fire({ icon: 'success', title: 'Salida registrada' });
            }
            renderStock(inventory);
        }

        document.getElementById('search-out').value = '';
        document.getElementById('output-area').innerHTML = '';

        // Sincronizar servidor
        try {
            await fetch(WEB_APP_URL, { 
                method: 'POST', 
                body: JSON.stringify({ action: "update", id: match.id, rack: match.rack, nuevaCantidad: nuevaCant }) 
            });
        } catch (e) { loadData(); }
    }

    document.getElementById('form-ingreso').addEventListener('submit', async function(e) {
        e.preventDefault();
        const payload = {
            action: "add",
            id: document.getElementById('in-id').value,
            cantidad: parseInt(document.getElementById('in-cantidad').value),
            fecha: document.getElementById('in-fecha').value,
            bodega: document.getElementById('in-bodega').value,
            rack: document.getElementById('in-rack').value,
            usuario: currentUser
        };
        Toast.fire({ icon: 'success', title: 'Ingresado' });
        document.getElementById('form-ingreso').reset();
        await fetch(WEB_APP_URL, { method: 'POST', body: JSON.stringify(payload) });
        loadData();
    });

    function showSection(id, el) {
        document.querySelectorAll('section').forEach(s => s.style.display = 'none');
        document.getElementById(id).style.display = 'block';
        document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
        if(el) el.classList.add('active');
        if(window.innerWidth < 992) toggleSidebar();
    }

    function logout() { localStorage.clear(); location.reload(); }
    function showLoader(show) { document.getElementById('loader').style.display = show ? 'flex' : 'none'; }
</script>
</body>
</html>
